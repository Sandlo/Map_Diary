<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Map Diary</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
</head>
<body>
    <!-- NEU: App-Header mit Filtern -->
    <header id="app-header">
        <div class="header-title">🌍 World Map Diary</div>
        <div class="header-controls">
            <!-- Filter für die Karte -->
            <select id="filter-user">
                <option value="">Alle Nutzer</option>
                <!-- Wird per JS befüllt -->
            </select>
            <select id="filter-trip">
                <option value="">Alle Reisen</option>
                <!-- Wird per JS befüllt -->
            </select>
            <button id="open-sidebar-btn" class="secondary-btn">☰ Menü</button>
        </div>
    </header>

    <div id="map"></div>

    <div id="sidebar">
        <button id="close-sidebar">Schließen ✖</button>
        <!-- NEU: Suche in der Sidebar -->
        <div class="sidebar-search">
            <h3>Reise suchen</h3>
            <select id="sidebar-trip-search">
                <option value="">Reise auswählen...</option>
                <!-- Wird per JS befüllt -->
            </select>
        </div>
        <hr>
        <div id="sidebar-content">
            <!-- Wird dynamisch befüllt -->
        </div>
    </div>

    <div id="pin-modal" class="hidden">
        <div class="modal-content">
            <span id="close-modal">&times;</span>
            <h3>Neuen Ort markieren</h3>
            <form id="pin-form">
                <input type="text" id="pin-title" placeholder="Titel (z.B. Tempel in Seoul)" required>
                <input type="date" id="pin-date" required>
                
                <div class="form-row">
                    <!-- Das 'list' Attribut verbindet das Feld mit der Datalist -->
                    <input type="text" id="pin-user" list="user-list" placeholder="Nutzer (z.B. Luca)" required>
                    <datalist id="user-list"></datalist>
                    
                    <input type="text" id="pin-tag" list="trip-list" placeholder="Trip-Tag (z.B. Asien26)" required>
                    <datalist id="trip-list"></datalist>
                </div>

                <!-- NEU: Farbe und Kategorie -->
                <div class="form-row">
                    <div class="color-picker-wrapper">
                        <label for="pin-color">Reise-Farbe:</label>
                        <input type="color" id="pin-color" value="#0078D7">
                    </div>
                    <select id="pin-category" required>
                        <option value="📍">📍 Standard</option>
                        <option value="🍽️">🍽️ Restaurant/Essen</option>
                        <option value="📸">📸 Aussicht/Sehenswürdigkeit</option>
                        <option value="🏛️">🏛️ Kultur/Museum</option>
                        <option value="🛏️">🛏️ Hotel/Unterkunft</option>
                        <option value="🍿">🍿 Unterhaltung/Kino</option>
                    </select>
                </div>

                <textarea id="pin-desc" placeholder="Beschreibung deiner Erlebnisse..." rows="3" required></textarea>
                <input type="file" id="pin-images" accept="image/*" multiple required>
                <button type="submit">Speichern</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
