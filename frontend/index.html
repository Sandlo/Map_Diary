<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Map Diary</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<header id="topbar">
    

    <div class="topbar-filters">
      <select id="map-filter-user">
        <option value="">Alle Nutzer</option>
      </select>

      <select id="map-filter-trip">
        <option value="">Alle Reisen</option>
      </select>

      <select id="map-filter-year">
        <option value="">Alle Jahre</option>
      </select>
    </div>

    <div class="topbar-title-container">
      <div class="topbar-title">
        <h1>Travel Map Diary</h1>
      </div>
    </div>

    <div class="topbar-right">
      <button id="open-sidebar-btn" type="button">☰ Reisen</button>
      <button id="add-pin-btn" type="button">＋ Neuer Pin</button>
    </div>
</header>

<body>
  <!-- MAP -->
  <div id="map"></div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <button id="close-sidebar" type="button">Schließen ✖</button>

    <h3>Reisen</h3>

    <!-- Sidebar Filter -->
    <div class="filters">
      <select id="filter-user">
        <option value="">Alle Nutzer</option>
      </select>

      <select id="filter-trip">
        <option value="">Alle Reisen</option>
      </select>

      <select id="filter-region">
        <option value="">Alle Länder / Kontinente</option>
      </select>

      <button id="clear-filters" type="button">Filter zurücksetzen</button>
    </div>

    <!-- Trip list -->
    <ul id="trip-list"></ul>

    <hr />

    <!-- Timeline -->
    <div id="sidebar-content"></div>
  </div>

  <!-- Sidebar Toggle (must be AFTER sidebar for the ~ selector) -->
  <button id="sidebar-toggle" type="button" aria-label="Sidebar öffnen/schließen">❯</button>

  <!-- PIN MODAL -->
  <div id="pin-modal" class="hidden">
    <div class="modal-content">
      <span id="close-modal" title="Schließen">×</span>
      <h3>Neuen Ort markieren</h3>

      <form id="pin-form">
        <input type="text" id="pin-title" placeholder="Titel (z.B. Tempel in Seoul)" required />

        <input type="date" id="pin-date" required />
        <input type="time" id="pin-time" required />

        <!-- User + Reise mit Vorschlägen -->
        <input type="text" id="pin-user" list="user-list" placeholder="Nutzer (z.B. Luca)" required />
        <datalist id="user-list"></datalist>

        <input type="text" id="pin-tag" list="trip-list-datalist" placeholder="Reise (z.B. Asien26)" required />
        <datalist id="trip-list-datalist"></datalist>

        <!-- Ort-Typ -->
        <select id="pin-type" required>
          <option value="" disabled selected>Ort-Typ wählen…</option>
          <option>Restaurant</option>
          <option>Café</option>
          <option>Bar</option>
          <option>Sight</option>
          <option>Museum</option>
          <option>Aussicht</option>
          <option>Wanderung</option>
          <option>Strand</option>
          <option>Shopping</option>
          <option>Hotel</option>
          <option>Transport</option>
          <option>Sonstiges</option>
        </select>

        <!-- Farbe pro Reise -->
        <label class="color-row">
          Reise-Farbe:
          <input type="color" id="pin-trip-color" value="#0078D7" />
        </label>

        <textarea id="pin-desc" placeholder="Beschreibung deiner Erlebnisse..." rows="3" required></textarea>

        <input type="file" id="pin-images" accept="image/*" multiple required />

        <button type="submit">Speichern</button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- MarkerCluster -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- App -->
  <script src="js/app.js"></script>
</body>
</html>
