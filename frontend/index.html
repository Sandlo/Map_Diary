<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Map Diary</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="map"></div>

    <div id="sidebar">
        <button id="close-sidebar">Schließen ✖</button>
        <div id="sidebar-content">
            <!-- Wird dynamisch befüllt -->
        </div>
    </div>

    <div id="pin-modal" class="hidden">
        <div class="modal-content">
            <span id="close-modal">&times;</span>
            <h3>Neuen Ort markieren</h3>
            <form id="pin-form">
                <input type="text" id="pin-title" placeholder="Titel (z.B. Tempel in Seoul)" required>
                <input type="date" id="pin-date" required>
                <input type="text" id="pin-user" placeholder="Nutzer (z.B. Luca)" required>
                <input type="text" id="pin-tag" placeholder="Trip-Tag (z.B. Asien26)" required>
                <textarea id="pin-desc" placeholder="Beschreibung deiner Erlebnisse..." rows="3" required></textarea>
                <!-- WICHTIG: Das 'multiple' Attribut -->
                <input type="file" id="pin-images" accept="image/*" multiple required>
                <button type="submit">Speichern</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
